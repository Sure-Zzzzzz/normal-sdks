dependencies {
    // 依赖 search-core（提供 EsQueryEvent、EsAggEvent）
    api 'io.github.sure-zzzzzz:simple-elasticsearch-search-core:1.0.10'

    // Spring Boot（仅编译时依赖）
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure'
    compileOnly 'org.springframework:spring-context'
    compileOnly 'org.springframework.boot:spring-boot-starter-web'

    // 测试依赖
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-aop'
    testImplementation 'org.springframework.boot:spring-boot-starter-log4j2'

    // ES 查询模块（用于测试）
    testImplementation 'io.github.sure-zzzzzz:simple-elasticsearch-search-starter:1.6.4'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-elasticsearch'
    testImplementation 'org.apache.httpcomponents:httpclient'
    testImplementation 'org.apache.httpcomponents:httpcore'

    // AKSK 认证模块（用于集成测试）
    testImplementation 'io.github.sure-zzzzzz:simple-aksk-resource-server-starter:2.0.0'
    testImplementation 'io.github.sure-zzzzzz:simple-aksk-resource-audit-listener-starter:2.0.0'

    // Spring Security
    testImplementation 'org.springframework.boot:spring-boot-starter-security'
    testImplementation 'org.springframework.security:spring-security-oauth2-jose'
    testImplementation 'org.springframework.security:spring-security-oauth2-resource-server'
    testImplementation 'org.springframework.security:spring-security-test'
}