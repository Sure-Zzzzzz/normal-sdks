io:
  github:
    surezzzzzz:
      sdk:
        elasticsearch:
          route:
            enable: true
            default-source: primary

            sources:
              primary:
                urls: http://localhost:9203
                connect-timeout: 5000
                socket-timeout: 60000
                keep-alive-strategy: 300
                max-conn-total: 100
                max-conn-per-route: 10
                enable-connection-reuse: true

              secondary:
                urls: http://localhost:9200
                connect-timeout: 5000
                socket-timeout: 60000
                keep-alive-strategy: 300
                max-conn-total: 100
                max-conn-per-route: 10
                enable-connection-reuse: true

            rules:
              - pattern: "test_index_b.secondary"
                datasource: secondary
                type: exact
                priority: 10
              - pattern: "test_index.history"
                datasource: secondary
                type: exact
                priority: 10
              - pattern: "*.secondary"
                datasource: secondary
                type: wildcard
                priority: 20
              # 1.1.0 新功能测试用规则：异步写 + 日期分片
              - pattern: "async_write.*"
                datasource: secondary
                type: wildcard
                priority: 30
                async-write: true
                write-index-template: "async_write-{yyyy.MM.dd}"
              # 1.1.0 新功能测试用规则：同步写日期分片
              - pattern: "date_shard.year.*"
                datasource: secondary
                type: wildcard
                priority: 28
                write-index-template: "date_shard_year-{yyyy}"
                read-index-pattern: "date_shard_year-*"
              - pattern: "date_shard.month.*"
                datasource: secondary
                type: wildcard
                priority: 29
                write-index-template: "date_shard_month-{yyyy.MM}"
                read-index-pattern: "date_shard_month-*"
              - pattern: "date_shard.*"
                datasource: secondary
                type: wildcard
                priority: 30
                write-index-template: "date_shard-{yyyy.MM.dd}"
                read-index-pattern: "date_shard-*"

logging:
  level:
    io.github.surezzzzzz.sdk.elasticsearch.route: DEBUG
