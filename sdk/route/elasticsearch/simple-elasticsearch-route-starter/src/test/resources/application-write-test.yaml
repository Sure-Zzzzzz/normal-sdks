io:
  github:
    surezzzzzz:
      sdk:
        elasticsearch:
          route:
            enable: true
            default-source: primary

            sources:
              # primary 指向不存在的端口,如果路由错误会连接失败
              primary:
                urls: http://localhost:9202
                connect-timeout: 5000
                socket-timeout: 60000
                keep-alive-strategy: 300
                max-conn-total: 100
                max-conn-per-route: 10
                enable-connection-reuse: true

              # secondary 不在此文件定义，默认继承 application.yaml；版本 profile 会按对应测试场景覆盖。

            rules:
              # test_index_b.secondary 应该路由到 secondary
              - pattern: "test_index_b.secondary"
                datasource: secondary
                type: exact
                priority: 10
              # write_test_secondary 应该路由到 secondary
              - pattern: "write_test_secondary"
                datasource: secondary
                type: exact
                priority: 10
              # *.secondary 通配符规则
              - pattern: "*.secondary"
                datasource: secondary
                type: wildcard
                priority: 20

              # 1.1.1 时区集成测试：rule 级固定跨日时区覆盖全局（新分组配置）
              - pattern: "tz_rule.*"
                datasource: secondary
                type: wildcard
                priority: 26
                write-index:
                  template: "tz_rule-{yyyy.MM.dd}"
                  zone-id: Etc/GMT+12
                read-index:
                  pattern: "tz_rule-*"

              # 1.1.1 时区集成测试：不配 rule 级，继承全局固定跨日时区（新分组配置）
              - pattern: "tz_global.*"
                datasource: secondary
                type: wildcard
                priority: 27
                write-index:
                  template: "tz_global-{yyyy.MM.dd}"
                read-index:
                  pattern: "tz_global-*"

logging:
  level:
    io.github.surezzzzzz.sdk.elasticsearch.route: DEBUG
