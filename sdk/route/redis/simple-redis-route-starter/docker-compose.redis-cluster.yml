services:
  redis-route-cluster:
    image: redis:7.2.6
    container_name: redis-route-cluster
    ports:
      - "7000:7000"
      - "7001:7001"
      - "7002:7002"
      - "7003:7003"
      - "7004:7004"
      - "7005:7005"
    volumes:
      - ./redis-cluster-entrypoint.sh:/redis-cluster-entrypoint.sh:ro
    entrypoint: ["sh", "/redis-cluster-entrypoint.sh"]
