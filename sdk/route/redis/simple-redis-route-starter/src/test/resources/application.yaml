io:
  github:
    surezzzzzz:
      sdk:
        redis:
          route:
            enable: true
            default-source: default
            sources:
              default:
                host: localhost
                port: 6379
                database: 0
                timeout-ms: 3000
                connect-timeout-ms: 3000
              cache:
                host: localhost
                port: 6379
                database: 1
                timeout-ms: 3000
                connect-timeout-ms: 3000
              lock:
                host: localhost
                port: 6379
                database: 2
                timeout-ms: 3000
                connect-timeout-ms: 3000
            rules:
              - pattern: "cache:"
                type: prefix
                datasource: cache
                priority: 1
              - pattern: "lock:"
                type: prefix
                datasource: lock
                priority: 2

logging:
  level:
    io.github.surezzzzzz.sdk.redis.route: DEBUG
