


io:
  github:
    surezzzzzz:
      sdk:
        elasticsearch:
          # Search 配置
          search:
            enable: true

            # 索引配置
            indices:
              # NL集成测试索引（lazy-load，SearchEndToEndTest 启动时创建）
              - name: "test_nl_user_index"
                date-split: false
                cache-mapping: true
                lazy-load: true
                field-mapping:
                  name:
                    - 姓名
                  age:
                    - 年龄
                  city:
                    - 城市
                  status:
                    - 状态
                  points:
                    - 积分
                  createTime:
                    - 创建时间
                  orderId:
                    - 订单ID

              # 普通索引（无标识符，直接使用索引名）
              - name: "test_order_index"
                lazy-load: true
                field-mapping:
                  order_id:
                    - 订单号
                    - 订单ID
                  product_name:
                    - 商品名
                  amount:
                    - 金额
                  quantity:
                    - 数量
                  status:
                    - 状态
                    - 订单状态
                  created_at:
                    - 创建时间

              # 通配符索引（无标识符，用于日期分割场景）
              - name: "test_log_*"
                date-split: true
                date-pattern: "yyyy.MM.dd"
                date-field: "createTime"
                cache-mapping: true
                lazy-load: true

              # 降级测试索引（用于端到端降级测试）
              - name: "test_downgrade_log--*"
                date-split: true
                date-pattern: "yyyy.MM.dd"
                date-field: "timestamp"
                cache-mapping: true
                lazy-load: true

              # 带别名的索引（少数场景） - 带敏感字段
              - name: "test_user_index"
                alias: test_user
                date-split: false
                cache-mapping: true
                lazy-load: true
                field-mapping:
                  name:
                    - 姓名
                    - 名字
                  age:
                    - 年龄
                  city:
                    - 城市
                  phone:
                    - 手机号
                sensitive-fields:
                  - field: password
                    strategy: FORBIDDEN
                  - field: phone
                    strategy: MASK
                    mask-start: 3
                    mask-end: 4
                    mask-pattern: "****"
              # Secondary 数据源索引（测试多数据源路由）
              - name: "test_index_b.secondary"
                date-split: false
                cache-mapping: true
                lazy-load: true
              # 同时有 field-mapping 和 sensitive-fields 的索引（测试敏感字段排除）
              - name: "test_employee_index"
                alias: "test_employee"
                date-split: false
                cache-mapping: true
                lazy-load: true
                field-mapping:
                  emp_id:
                    - 员工ID
                    - 工号
                  emp_name:
                    - 员工姓名
                    - 姓名
                  department:
                    - 部门
                  join_date:
                    - 入职日期
                  phone:
                    - 手机号
                sensitive-fields:
                  - field: salary
                    strategy: FORBIDDEN
                  - field: id_card
                    strategy: MASK
                    mask-start: 6
                    mask-end: 4
                    mask-pattern: "********"


            # Mapping 刷新配置
            mapping-refresh:
              enabled: false
              interval-seconds: 300

            # 查询限制配置
            query-limits:
              max-size: 10000
              default-size: 20
              max-offset: 10000
              ignore-unavailable-indices: true  # 测试环境开启，避免日期分割索引查询404
              default-date-range: 30d  # 通配索引未传 dateRange 时，自动补充最近 30 天

            # API 配置
            api:
              enabled: true
              base-path: /api
              include-score: false
              include-raw-response: true

            # 降级配置（索引路由智能降级）
            downgrade:
              enabled: true
              max-http-line-length: 4096
              max-level: 3
              enable-estimate: true
              auto-downgrade-index-count-threshold: 35

          # Route 配置
          route:
            enable: true
            default-source: primary
            sources:
              primary:
                urls: http://localhost:9200
                connect-timeout: 5000
                socket-timeout: 60000
                keep-alive-strategy: 300
                max-conn-total: 100
                max-conn-per-route: 10
                enable-connection-reuse: true
              secondary:
                urls: http://localhost:9203
                server-version: 6.2.2
                connect-timeout: 5000
                socket-timeout: 60000
                keep-alive-strategy: 300
                max-conn-total: 100
                max-conn-per-route: 10
                enable-connection-reuse: true
            rules:
              - pattern: "test_index_b.secondary"
                datasource: secondary
                type: exact
                priority: 10

        expression:
          condition:
            parser:
              enabled: true

logging:
  level:
    root: debug
    io.github.surezzzzzz.sdk.elasticsearch.search: DEBUG
    io.github.surezzzzzz.sdk.elasticsearch.route: DEBUG
