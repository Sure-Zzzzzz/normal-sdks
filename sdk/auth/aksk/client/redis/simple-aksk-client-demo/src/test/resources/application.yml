spring:
  profiles:
    active: local
  redis:
    host: localhost
    port: 6379
    database: 0

io:
  github:
    surezzzzzz:
      sdk:
        auth:
          aksk:
            client:
              enable: true
              server-url: http://localhost:8080
              token-endpoint: /oauth2/token
              client-id: test-client-id
              client-secret: test-client-secret
              redis:
                token:
                  cache-name: aksk-client-token
              resttemplate:
                enable: true
                max-total: 100
                max-per-route: 20
                connect-timeout: 5000
                read-timeout: 30000

        cache:
          enabled: true
          key-prefix: sure-auth-aksk-client
          me: aksk-client-demo
          l1:
            enabled: true
            expire-seconds: 2
            max-size: 1000
          l2:
            enabled: true
            expire-seconds: 3600
            preload:
              enabled: true
              before-expire-seconds: 60
          consistency:
            mode: strong

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000

logging:
  level:
    io.github.surezzzzzz.sdk.auth.aksk: DEBUG
    io.github.surezzzzzz.sdk.cache: DEBUG
