dependencies {
    // 依赖 client-core 模块
    api 'io.github.sure-zzzzzz:simple-aksk-client-core:1.0.1'

    // 依赖 smart-cache-starter（提供 L1+L2 两级缓存、分布式锁、Pub/Sub 一致性、L2 预刷新）
    // simple-redis-lock-starter 已由 smart-cache-starter 传递依赖，无需重复声明
    api 'io.github.sure-zzzzzz:smart-cache-starter:1.1.2'

    // Spring Boot
    compileOnly 'org.springframework.boot:spring-boot-configuration-processor'
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure'

    // Redis 支持（必须）
    compileOnly 'org.springframework.boot:spring-boot-starter-data-redis'
    // Web 支持（用于 RestTemplate）
    compileOnly 'org.springframework:spring-web'

    // 测试依赖
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-log4j2'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-redis'
    testImplementation 'org.springframework.boot:spring-boot-starter-aop'
    testImplementation 'com.github.ben-manes.caffeine:caffeine:2.9.3'
}
