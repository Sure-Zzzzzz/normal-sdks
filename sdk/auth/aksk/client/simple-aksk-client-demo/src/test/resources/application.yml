spring:
  profiles:
    active: local
  redis:
    host: localhost
    port: 6379
    database: 0

io:
  github:
    surezzzzzz:
      sdk:
        auth:
          aksk:
            client:
              enable: true
              server-url: http://localhost:8080
              token-endpoint: /oauth2/token
              client-id: test-client-id
              client-secret: test-client-secret
              token:
                refresh-before-expire: 300
              redis:
                token:
                  me: aksk-client-demo
              resttemplate:
                enable: true
                max-total: 100
                max-per-route: 20
                connect-timeout: 5000
                read-timeout: 30000

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000

logging:
  level:
    io.github.surezzzzzz.sdk.auth.aksk: DEBUG
