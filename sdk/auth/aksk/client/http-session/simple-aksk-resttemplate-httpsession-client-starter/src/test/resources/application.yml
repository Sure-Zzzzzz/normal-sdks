spring:
  profiles:
    active: local

io:
  github:
    surezzzzzz:
      sdk:
        auth:
          aksk:
            client:
              enable: true
              server-url: http://localhost:8080
              token-endpoint: /oauth2/token
              # client-id 和 client-secret 请在 application-local.yml 中配置
              token:
                refresh-before-expire: 300
              HttpSessionRestTemplateProperties:
                enable: true
                max-total: 100
                max-per-route: 20
                connect-timeout: 5000
                read-timeout: 30000

logging:
  level:
    io.github.surezzzzzz.sdk.auth.aksk: DEBUG
