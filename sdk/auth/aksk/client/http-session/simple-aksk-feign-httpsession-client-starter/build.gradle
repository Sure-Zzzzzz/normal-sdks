dependencies {
    // 依赖 httpsession-token-manager 模块
    api 'io.github.sure-zzzzzz:simple-aksk-httpsession-token-manager:1.0.1'

    // Spring Cloud OpenFeign（compileOnly，用户自行引入）
    compileOnly 'org.springframework.cloud:spring-cloud-starter-openfeign:3.1.8'

    // Spring Boot
    compileOnly 'org.springframework.boot:spring-boot-configuration-processor'
    compileOnly 'org.springframework.boot:spring-boot-autoconfigure'
    compileOnly 'javax.annotation:javax.annotation-api:1.3.2'

    // 测试依赖
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.cloud:spring-cloud-starter-openfeign:3.1.8'
    testImplementation 'io.github.openfeign:feign-httpclient:11.10'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-redis'
    testImplementation 'org.springframework.boot:spring-boot-starter-log4j2'
    testImplementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-aop'
    testImplementation 'com.github.ben-manes.caffeine:caffeine:2.9.3'
}
