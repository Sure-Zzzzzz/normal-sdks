spring:
  profiles:
    active: local
  redis:
    host: localhost
    port: 6379
    database: 0

io:
  github:
    surezzzzzz:
      sdk:
        auth:
          aksk:
            client:
              enable: true
              client-id: test-client-id
              client-secret: test-client-secret
              server-url: http://localhost:8080
              token-endpoint: /oauth2/token
              token:
                refresh-before-expire: 300
              redis:
                token:
                  cache-name: aksk-client-token

        cache:
          enabled: true
          key-prefix: sure-auth-aksk-client
          me: feign-test-app
          l1:
            enabled: true
            expire-seconds: 2
            max-size: 1000
          l2:
            enabled: true
            expire-seconds: 3600
            preload:
              enabled: true
              before-expire-seconds: 300
          consistency:
            mode: strong

# Feign 配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 30000

# 日志配置
logging:
  level:
    io.github.surezzzzzz.sdk.auth.aksk: DEBUG
    io.github.surezzzzzz.sdk.cache: DEBUG
