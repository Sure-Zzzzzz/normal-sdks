<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建用户级AKSK</title>
    <link href="/admin/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>创建用户级AKSK</h4>
                </div>
                <div class="card-body">
                    <!-- 错误提示 -->
                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/admin/create-user}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="ownerUserId" class="form-label">用户ID <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="ownerUserId" name="ownerUserId"
                                   placeholder="例如：user123" required>
                            <div class="form-text">拥有此AKSK的用户唯一标识</div>
                        </div>

                        <div class="mb-3">
                            <label for="ownerUsername" class="form-label">用户名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="ownerUsername" name="ownerUsername"
                                   placeholder="例如：张三" required>
                            <div class="form-text">用户的显示名称</div>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label">AKSK名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="例如：移动端应用密钥" required>
                            <div class="form-text">用于标识此AKSK的用途</div>
                        </div>

                        <div class="mb-3">
                            <label for="scopes" class="form-label">API 权限范围</label>
                            <textarea class="form-control" id="scopes" name="scopes" rows="3"
                                      placeholder="例如：/api/**,/admin/**,/user/**">/api/**</textarea>
                            <div class="form-text">
                                多个权限用<strong>逗号</strong>分隔，支持通配符 (*)。<span class="text-danger">不允许使用回车换行</span>
                            </div>
                            <div class="form-text text-danger" id="scopeError" style="display:none;">
                                ⚠️ 检测到回车换行，请使用逗号分隔
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" id="submitBtn">创建</button>
                            <a href="/admin" class="btn btn-secondary">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/admin/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        const scopesTextarea = document.getElementById('scopes');
        const scopeError = document.getElementById('scopeError');
        const form = document.querySelector('form');

        // 1. 阻止回车输入
        scopesTextarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                scopeError.style.display = 'block';
                scopesTextarea.classList.add('is-invalid');

                // 3秒后自动隐藏错误提示
                setTimeout(function() {
                    scopeError.style.display = 'none';
                    scopesTextarea.classList.remove('is-invalid');
                }, 3000);
            }
        });

        // 2. 处理粘贴内容，自动替换换行为逗号
        scopesTextarea.addEventListener('paste', function(e) {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');

            // 将所有换行符（\n, \r\n, \r）替换为逗号
            const cleanedText = pastedText.replace(/[\r\n]+/g, ',');

            // 插入到光标位置
            const start = this.selectionStart;
            const end = this.selectionEnd;
            const currentValue = this.value;
            this.value = currentValue.substring(0, start) + cleanedText + currentValue.substring(end);

            // 设置光标位置
            const newPosition = start + cleanedText.length;
            this.setSelectionRange(newPosition, newPosition);

            // 如果原始内容包含换行，显示提示
            if (pastedText !== cleanedText) {
                scopeError.textContent = '✓ 已自动将换行符替换为逗号';
                scopeError.classList.remove('text-danger');
                scopeError.classList.add('text-success');
                scopeError.style.display = 'block';

                setTimeout(function() {
                    scopeError.style.display = 'none';
                    scopeError.classList.remove('text-success');
                    scopeError.classList.add('text-danger');
                    scopeError.textContent = '⚠️ 检测到回车换行，请使用逗号分隔';
                }, 3000);
            }
        });

        // 3. 表单提交前验证
        form.addEventListener('submit', function(e) {
            const scopesValue = scopesTextarea.value;

            // 检查是否包含换行符
            if (/[\r\n]/.test(scopesValue)) {
                e.preventDefault();
                scopeError.textContent = '⚠️ 检测到回车换行，请使用逗号分隔';
                scopeError.style.display = 'block';
                scopesTextarea.classList.add('is-invalid');
                scopesTextarea.focus();

                // 滚动到错误位置
                scopesTextarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return false;
            }

            return true;
        });

        // 4. 输入时实时检查
        scopesTextarea.addEventListener('input', function() {
            if (/[\r\n]/.test(this.value)) {
                scopeError.style.display = 'block';
                this.classList.add('is-invalid');
            } else {
                scopeError.style.display = 'none';
                this.classList.remove('is-invalid');
            }
        });
    })();
</script>
</body>
</html>
