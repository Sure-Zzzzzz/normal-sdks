<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="40%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="300" height="90" rx="14" fill="url(#bgGrad)"/>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="300" height="3" rx="14" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- SURE 部分 -->
  <text x="30" y="52"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="38" font-weight="900"
        fill="url(#textGrad)"
        filter="url(#glow)"
        letter-spacing="-1">SURE</text>

  <!-- AKSK 部分 -->
  <text x="158" y="56"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="34" font-weight="900"
        fill="url(#accentGrad)"
        filter="url(#glow)"
        letter-spacing="2">AKSK</text>

  <!-- 副标题 -->
  <text x="50" y="72"
        font-family="'Courier New', monospace"
        font-size="10" font-weight="400"
        fill="#60a5fa" opacity="0.7"
        letter-spacing="3">ACCESS KEY · SECRET KEY</text>

</svg>
