spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/sure_auth_aksk?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: # 请在 application-local.yml 中配置真实密码
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  redis:
    host: localhost
    port: 6379
    database: 1
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2
        max-wait: -1ms

io:
  github:
    surezzzzzz:
      sdk:
        auth:
          aksk:
            server:
              jwt:
                key-id: test-key-2026
                public-key: classpath:keys/public.pem
                private-key: classpath:keys/private.pem
                expires-in: 3600
              redis:
                token:
                  me: "test-app"
              admin:
                enabled: true
                username: admin
                password: # 请在 application-local.yml 中配置真实密码
              introspect:
                require-authentication: true  # 默认 true，改为 false 则允许匿名 introspect
              limiter:
                oauth2:
                  token:
                    limits:
                      - count: 1000000
                        window: 1
                        unit: MINUTES
                  introspect:
                    limits:
                      - count: 1000000
                        window: 1
                        unit: MINUTES
                  revoke:
                    limits:
                      - count: 1000000
                        window: 1
                        unit: MINUTES
        limiter:
          redis:
            smart:
              enable: true
              me: ${io.github.surezzzzzz.sdk.auth.aksk.server.redis.token.me:test-app}
              mode: annotation
        cache:
          key-prefix: sure-auth-aksk
          me: ${io.github.surezzzzzz.sdk.auth.aksk.server.redis.token.me:test-app}
          l1:
            enabled: true
            expire-seconds: 10
            max-size: 10000
          l2:
            enabled: true
            expire-seconds: ${io.github.surezzzzzz.sdk.auth.aksk.server.jwt.expires-in:3600}
            key-format: "{keyPrefix}:{me}:{cacheName}::{key}"
          consistency:
            mode: strong
logging:
  level:
    io.github.surezzzzzz.sdk.auth.aksk.server: DEBUG
    org.springframework.security: DEBUG
    io.github.surezzzzzz.sdk.cache.pubsub.CacheInvalidationListener: TRACE
