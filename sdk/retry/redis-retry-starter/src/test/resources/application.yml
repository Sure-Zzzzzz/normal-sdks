io:
  github:
    surezzzzzz:
      sdk:
        retry:
          redis:
            enable: true
            key-prefix: sure-redis-retry-test
            me: test-app
            max-retry-count: 3
            base-delay-ms: 1000
            max-delay-ms: 30000
            retry-record-ttl-seconds: 3600
            force-hash-tag: false

logging:
  level:
    io.github.surezzzzzz.sdk.retry.redis: DEBUG
    redis.embedded: WARN
