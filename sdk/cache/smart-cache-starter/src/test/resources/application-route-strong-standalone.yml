io:
  github:
    surezzzzzz:
      sdk:
        redis:
          route:
            enable: true
            default-source: default
            sources:
              default:
                mode: standalone
                host: localhost
                port: 16379
                database: 0
                timeout-ms: 3000
                connect-timeout-ms: 3000
              cache:
                mode: standalone
                host: localhost
                port: 16380
                database: 0
                timeout-ms: 3000
                connect-timeout-ms: 3000
              lock:
                mode: standalone
                host: localhost
                port: 16381
                database: 0
                timeout-ms: 3000
                connect-timeout-ms: 3000
            rules:
              - pattern: "strong-write-route-it:preload-lock:"
                type: prefix
                datasource: lock
                priority: 1
              - pattern: "strong-write-route-it-lock:"
                type: prefix
                datasource: lock
                priority: 2
              - pattern: "strong-write-route-sync:strong-write-route-group:route-probe"
                type: exact
                datasource: default
                priority: 3
              - pattern: "strong-write-route-it:"
                type: prefix
                datasource: cache
                priority: 10
        lock:
          redis:
            route:
              enable: true
        cache:
          me: strong-write-route-group
          key-prefix: strong-write-route-it
          consistency:
            mode: strong
          pubsub:
            mode: routed
            channel-prefix: strong-write-route-sync
          l2:
            expire-seconds: 60
            ttl-random-offset-ratio: 0
            preload:
              enabled: false

spring:
  redis:
    host: localhost
    port: 16379
    database: 0
    timeout: 3000
