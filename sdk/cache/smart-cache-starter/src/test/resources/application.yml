io:
  github:
    surezzzzzz:
      sdk:
        redis:
          route:
            enable: true
            default-source: default
            sources:
              default:
                mode: standalone
                host: localhost
                port: 6379
                database: 0
                timeout-ms: 3000
                connect-timeout-ms: 3000
        lock:
          redis:
            route:
              enable: true
        cache:
          enabled: true
          me: test-instance
          route:
            scan-enabled: true
          l1:
            enabled: true
            max-size: 10000
            expire-seconds: 60
            refresh-seconds: 50
          l2:
            enabled: true
            expire-seconds: 300
            ttl-random-offset-ratio: 0.1
          consistency:
            mode: strong
          stats:
            enabled: true

spring:
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000

logging:
  level:
    io.github.surezzzzzz.sdk.cache: DEBUG
