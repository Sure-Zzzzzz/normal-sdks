io:
  github:
    surezzzzzz:
      sdk:
        redis:
          route:
            enable: true
            default-source: default
            sources:
              default:
                mode: cluster
                nodes:
                  - localhost:17000
                  - localhost:17001
                  - localhost:17002
                  - localhost:17003
                  - localhost:17004
                  - localhost:17005
                timeout-ms: 3000
                connect-timeout-ms: 3000
                lettuce:
                  cluster-adaptive-refresh: true
                  cluster-periodic-refresh: true
                  cluster-refresh-period-ms: 30000
              cache:
                mode: cluster
                nodes:
                  - localhost:17010
                  - localhost:17011
                  - localhost:17012
                  - localhost:17013
                  - localhost:17014
                  - localhost:17015
                timeout-ms: 3000
                connect-timeout-ms: 3000
                lettuce:
                  cluster-adaptive-refresh: true
                  cluster-periodic-refresh: true
                  cluster-refresh-period-ms: 30000
              lock:
                mode: cluster
                nodes:
                  - localhost:17020
                  - localhost:17021
                  - localhost:17022
                  - localhost:17023
                  - localhost:17024
                  - localhost:17025
                timeout-ms: 3000
                connect-timeout-ms: 3000
                lettuce:
                  cluster-adaptive-refresh: true
                  cluster-periodic-refresh: true
                  cluster-refresh-period-ms: 30000
            rules:
              - pattern: "smart-cache-route-it:preload-lock:"
                type: prefix
                datasource: lock
                priority: 1
              - pattern: "smart-cache-route-it-lock:"
                type: prefix
                datasource: lock
                priority: 2
              - pattern: "smart-cache-route-it:route-cross:route-it::{smart-cache-route-it:route-cross:route-it}default-key"
                type: exact
                datasource: default
                priority: 3
              - pattern: "route-cache-sync:route-it:route-probe"
                type: exact
                datasource: default
                priority: 4
              - pattern: "smart-cache-route-it:"
                type: prefix
                datasource: cache
                priority: 10
        lock:
          redis:
            route:
              enable: true
        cache:
          me: route-it
          key-prefix: smart-cache-route-it
          consistency:
            mode: strong
          pubsub:
            mode: routed
            channel-prefix: route-cache-sync
          l2:
            expire-seconds: 60
            ttl-random-offset-ratio: 0
            preload:
              enabled: true
              before-expire-seconds: 5
          route:
            scan-enabled: true
            scan-count: 100

spring:
  redis:
    cluster:
      nodes:
        - localhost:17000
        - localhost:17001
        - localhost:17002
        - localhost:17003
        - localhost:17004
        - localhost:17005
    timeout: 3000
