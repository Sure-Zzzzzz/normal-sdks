io:
  github:
    surezzzzzz:
      sdk:
        cache:
          enabled: true
          me: test-instance-strong
          l1:
            enabled: true
            max-size: 1000
            expire-seconds: 60
            refresh-seconds: 50
          l2:
            enabled: true
            expire-seconds: 300
            ttl-random-offset-ratio: 0.1
          consistency:
            mode: strong
            pubsub-channel-prefix: test-cache-sync
          stats:
            enabled: true

spring:
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000
    # Lettuce 客户端配置
    lettuce:
      pool:
        # 连接池配置
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
      # 关键：设置为不验证连接，避免启动时连接失败
      shutdown-timeout: 100ms

logging:
  level:
    io.github.surezzzzzz.sdk.cache: DEBUG
