io:
  github:
    surezzzzzz:
      sdk:
        cache:
          enabled: true
          me: test-instance-eventual
          l1:
            enabled: true
            max-size: 1000
            expire-seconds: 60
            refresh-seconds: 50
          l2:
            enabled: true
            expire-seconds: 300
            ttl-random-offset-ratio: 0.1
          consistency:
            mode: eventual
          stats:
            enabled: true

spring:
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000

logging:
  level:
    io.github.surezzzzzz.sdk.cache: DEBUG
