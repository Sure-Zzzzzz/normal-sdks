<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>限流策略管理登录</title>
    <link rel="stylesheet" th:href="@{${bootstrapCssUrl}}">
    <link rel="stylesheet" th:href="@{${managementUiCssUrl}}">
</head>
<body class="login-page d-flex align-items-center justify-content-center p-3">
<main class="card login-card">
    <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
            <img th:src="@{/smart-redis-limiter-management/icon.svg}" width="56" height="56" alt="Sure-Zzzzzz">
            <h1 class="h3 management-brand mt-3 mb-2">限流策略管理</h1>
            <p class="text-muted mb-0">管理员登录</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            用户名或密码错误，请重新输入。
        </div>
        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            您已安全退出登录。
        </div>

        <form method="post" th:action="@{${loginUrl}}">
            <div class="mb-3">
                <label class="form-label" for="username">用户名</label>
                <input class="form-control form-control-lg" id="username" type="text" name="username"
                       autocomplete="username" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">密码</label>
                <input class="form-control form-control-lg" id="password" type="password" name="password"
                       autocomplete="current-password" required>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="d-grid">
                <button class="btn btn-primary btn-lg" type="submit">登录管理台</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
